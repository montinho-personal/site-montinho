<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PT Pro — Gestão de Personal Trainer</title>
<link rel="stylesheet" href="https://unpkg.com/@tabler/icons-webfont@latest/tabler-icons.min.css">
<style>
/* ===== GLOBAL BUTTON COLOR FIX ===== */

/* btn-primary: fundo lime → texto preto */
.btn-primary,
.btn-primary span,
.btn-primary i,
.btn-primary .ti,
.btn-primary .ti::before,
.btn-primary i::before { color: #09090E !important; }

/* q-btn (⚡ registro rápido): fundo lime → texto preto */
.q-btn,
.q-btn span,
.q-btn i,
.q-btn .ti,
.q-btn .ti::before,
.q-btn i::before { color: #09090E !important; }

/* logo-icon: fundo lime → texto preto */
.logo-icon,
.logo-icon *,
.logo-icon .ti::before,
.logo-icon i::before { color: #09090E !important; }

/* btn-ghost: fundo escuro → texto branco */
.btn-ghost,
.btn-ghost span,
.btn-ghost i,
.btn-ghost .ti,
.btn-ghost .ti::before,
.btn-ghost i::before { color: #F0F0F8 !important; }

/* btn-wa: fundo verde escuro → texto verde claro */
.btn-wa,
.btn-wa span,
.btn-wa i,
.btn-wa .ti,
.btn-wa .ti::before,
.btn-wa i::before { color: #50E0A0 !important; }

/* btn-danger: fundo vermelho escuro → texto vermelho claro */
.btn-danger,
.btn-danger span,
.btn-danger i,
.btn-danger .ti,
.btn-danger .ti::before,
.btn-danger i::before { color: #FF5555 !important; }
</style>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#09090E;--bg2:#111118;--bg3:#18181F;--bg4:#22222C;
  --border:#2A2A38;--border2:#3A3A4A;
  --text:#F0F0F8;--text2:#C0C0D0;--text3:#707088;
  --accent:#C8F04D;--accent2:#A8D030;--accent-dim:#C8F04D22;
  --red:#FF5555;--red-dim:#FF555522;
  --amber:#F0A020;--amber-dim:#F0A02022;
  --green:#50E0A0;--green-dim:#50E0A022;
  --blue:#5090FF;--blue-dim:#5090FF22;
}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Inter',sans-serif;font-size:14px;min-height:100vh;display:flex}

/* Sidebar */
.sidebar{width:220px;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;padding:16px 12px;flex-shrink:0;position:fixed;top:0;bottom:0;left:0;z-index:10}
.logo{display:flex;align-items:center;gap:10px;padding:8px 12px 20px;border-bottom:1px solid var(--border);margin-bottom:12px}
.logo-icon{width:32px;height:32px;background:var(--accent);border-radius:8px;display:flex;align-items:center;justify-content:center;color:#09090E !important;font-size:16px}
.logo-icon *{color:#09090E !important}
.logo-text{font-weight:600;font-size:15px;color:var(--text)}
.logo-sub{font-size:11px;color:var(--text3)}
.nav-section{font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;padding:4px 12px 6px;margin-top:4px}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:8px;cursor:pointer;color:var(--text2);font-size:13px;font-weight:500;transition:all .15s}
.nav-item:hover{background:var(--bg3);color:var(--text)}
.nav-item.active{background:var(--accent-dim);color:var(--accent)}
.nav-item .ti{font-size:16px}
.nav-badge{margin-left:auto;background:var(--red);color:#fff !important;font-size:10px;font-weight:700;padding:2px 6px;border-radius:10px}
.sidebar-bottom{margin-top:auto;padding-top:12px;border-top:1px solid var(--border)}

/* Main */
.main{margin-left:220px;flex:1;min-height:100vh}
.topbar{background:var(--bg2);border-bottom:1px solid var(--border);padding:12px 24px;display:flex;align-items:center;gap:16px;position:sticky;top:0;z-index:5}
.topbar-title{font-size:17px;font-weight:600;color:var(--text)}
.topbar-sub{font-size:12px;color:var(--text3)}
.search-box{display:flex;align-items:center;gap:8px;background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:7px 12px;flex:1;max-width:360px;margin-left:auto}
.search-box input{background:none;border:none;outline:none;color:var(--text);font-size:13px;width:100%}
.search-box input::placeholder{color:var(--text3)}
.content{padding:24px}

/* ===== BUTTONS — text forced visible with !important ===== */
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:8px;border:none;cursor:pointer;font-size:13px;font-weight:600;transition:all .15s;line-height:1;text-decoration:none;white-space:nowrap}
/* Primary: lime bg + near-black text */
.btn-primary{background:var(--accent) !important;color:#09090E !important;border:none !important}
.btn-primary *{color:#09090E !important}
.btn-primary:hover{background:var(--accent2) !important}
/* Ghost: dark surface + white text */
.btn-ghost{background:var(--bg3) !important;color:var(--text) !important;border:1px solid var(--border2) !important}
.btn-ghost *{color:var(--text) !important}
.btn-ghost:hover{background:var(--bg4) !important}
/* WhatsApp green */
.btn-wa{background:#1a3a28 !important;color:#50E0A0 !important;border:1px solid #50E0A033 !important}
.btn-wa *{color:#50E0A0 !important}
.btn-wa:hover{background:#214d34 !important}
/* Danger */
.btn-danger{background:var(--red-dim) !important;color:var(--red) !important;border:1px solid #FF555533 !important}
.btn-danger *{color:var(--red) !important}
.btn-sm{padding:5px 10px;font-size:12px}
.btn-wide{width:100%;justify-content:center}

/* Quick lightning register button */
.q-btn{background:var(--accent) !important;color:#09090E !important;border:none;padding:8px 12px;border-radius:8px;font-size:14px;font-weight:700;cursor:pointer;display:flex;align-items:center;flex-shrink:0;transition:all .15s}
.q-btn *{color:#09090E !important}
.q-btn:hover{background:var(--accent2) !important;transform:scale(.97)}

/* Cards & tables */
.metrics-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:24px}
.metric-card{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:16px 18px}
.metric-label{font-size:11px;color:var(--text3);font-weight:600;text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px}
.metric-value{font-size:26px;font-weight:700;color:var(--text);line-height:1}
.metric-value.accent{color:var(--accent)}
.metric-value.red{color:var(--red)}
.metric-value.amber{color:var(--amber)}
.metric-sub{font-size:11px;color:var(--text3);margin-top:4px}
.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.section-title{font-size:15px;font-weight:600;color:var(--text)}
.table-wrap{background:var(--bg2);border:1px solid var(--border);border-radius:14px;overflow:hidden}
.table{width:100%;border-collapse:collapse}
.table th{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;padding:12px 16px;border-bottom:1px solid var(--border);text-align:left}
.table td{padding:13px 16px;border-bottom:1px solid var(--border);font-size:13px;color:var(--text2)}
.table tr:last-child td{border-bottom:none}
.table tr:hover td{background:var(--bg3)}
.table td.name{color:var(--text);font-weight:500}

/* Badges */
.badge{display:inline-flex;align-items:center;padding:3px 8px;border-radius:6px;font-size:11px;font-weight:600}
.badge-green{background:var(--green-dim);color:var(--green)}
.badge-amber{background:var(--amber-dim);color:var(--amber)}
.badge-red{background:var(--red-dim);color:var(--red)}
.badge-blue{background:var(--blue-dim);color:var(--blue)}
.badge-gray{background:var(--bg4);color:var(--text2)}

/* Alerts */
.alert-strip{display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:10px;margin-bottom:10px;font-size:13px}
.alert-red{background:var(--red-dim);border:1px solid #FF555533;color:var(--red)}
.alert-amber{background:var(--amber-dim);border:1px solid #F0A02033;color:var(--amber)}
.alert-yellow{background:#F0E02022;border:1px solid #F0E02044;color:#F0E020}

/* Student card */
.student-card{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:16px;display:flex;align-items:center;gap:14px;cursor:pointer;transition:border-color .15s}
.student-card:hover{border-color:var(--border2)}
.students-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:12px}
.avatar{border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;flex-shrink:0}

/* Progress bar */
.bar-wrap{background:var(--bg3);border-radius:6px;overflow:hidden;margin:4px 0}
.bar-fill{border-radius:6px}

/* Tabs */
.tabs{display:flex;gap:4px;background:var(--bg3);border-radius:8px;padding:4px;margin-bottom:16px}
.tab{padding:7px 14px;border-radius:6px;font-size:13px;font-weight:500;cursor:pointer;color:var(--text2);transition:all .15s}
.tab.active{background:var(--bg);color:var(--text)}
.tab:hover{color:var(--text)}
.stat-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--border)}
.stat-row:last-child{border-bottom:none}

/* Modal */
.modal-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.78);z-index:100;display:flex;align-items:center;justify-content:center;padding:20px}
.modal{background:var(--bg2);border:1px solid var(--border);border-radius:14px;width:100%;max-width:540px;max-height:90vh;overflow-y:auto}
.modal-header{padding:20px 20px 0;display:flex;align-items:center;justify-content:space-between}
.modal-title{font-size:16px;font-weight:600;color:var(--text)}
.modal-body{padding:20px}
.modal-footer{padding:0 20px 20px;display:flex;justify-content:flex-end;gap:8px}
.form-group{margin-bottom:14px}
.form-label{font-size:12px;font-weight:600;color:var(--text2);margin-bottom:6px;display:block}
.form-input{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:9px 12px;color:var(--text);font-size:13px;outline:none;transition:border-color .15s}
.form-input:focus{border-color:#C8F04D88}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
select.form-input option{background:var(--bg2);color:var(--text)}

/* Charts */
.chart-row{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.chart-label{width:80px;font-size:12px;color:var(--text2);text-align:right;flex-shrink:0}
.chart-track{flex:1;background:var(--bg3);border-radius:4px;height:10px;overflow:hidden}
.chart-fill{height:100%;border-radius:4px;background:var(--accent)}
.chart-val{width:36px;font-size:12px;color:var(--text3)}

/* Toast */
.toast{position:fixed;bottom:24px;right:24px;background:var(--bg3);border:1px solid var(--border2);border-radius:10px;padding:12px 18px;font-size:13px;color:var(--text);z-index:999;display:flex;align-items:center;gap:10px;transform:translateY(80px);opacity:0;transition:all .25s;pointer-events:none}
.toast.show{transform:translateY(0);opacity:1}

/* ===== MOBILE BOTTOM NAV ===== */
.bottom-nav{display:none;position:fixed;bottom:0;left:0;right:0;background:var(--bg2);border-top:1px solid var(--border);z-index:50;padding:0 0 env(safe-area-inset-bottom,0)}
.bottom-nav-inner{display:flex;align-items:stretch}
.bnav-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:8px 2px 10px;cursor:pointer;color:var(--text3);font-size:9px;font-weight:500;letter-spacing:.02em;gap:3px;position:relative;min-width:0;transition:color .15s}
.bnav-item.active{color:var(--accent)}
.bnav-item .ti{font-size:20px;line-height:1}
.bnav-badge{position:absolute;top:6px;right:calc(50% - 14px);background:var(--red);color:#fff;font-size:9px;font-weight:700;padding:1px 4px;border-radius:8px;min-width:14px;text-align:center}

/* More menu overlay */
.more-overlay{display:none;position:fixed;inset:0;z-index:80}
.more-overlay.open{display:block}
.more-sheet{position:fixed;bottom:0;left:0;right:0;background:var(--bg2);border-top:1px solid var(--border);border-radius:20px 20px 0 0;z-index:90;padding:12px 0 calc(72px + env(safe-area-inset-bottom,0));transform:translateY(100%);transition:transform .25s}
.more-sheet.open{transform:translateY(0)}
.more-handle{width:36px;height:4px;background:var(--border2);border-radius:2px;margin:0 auto 16px}
.more-item{display:flex;align-items:center;gap:14px;padding:14px 24px;color:var(--text);font-size:15px;font-weight:500;cursor:pointer}
.more-item .ti{font-size:20px;color:var(--text2);width:24px;text-align:center}
.more-item.active{color:var(--accent)}
.more-item.active .ti{color:var(--accent)}

@media(max-width:768px){
  .sidebar{display:none!important}
  .main{margin-left:0!important;padding-bottom:72px}
  .bottom-nav{display:block}
  .metrics-grid{grid-template-columns:repeat(2,1fr)!important}
  .students-grid{grid-template-columns:1fr!important}
  .form-row{grid-template-columns:1fr!important}
  .topbar{padding:10px 14px}
  .page-content{padding:12px 14px!important}
  /* Profile: stack sidebar+content vertically */
  div[style*="grid-template-columns:280px"]{grid-template-columns:1fr!important;display:block!important}
  /* Table horizontal scroll */
  .table-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch}
  .table{min-width:420px}
  .modal{margin:12px;max-height:85vh}
  .modal-backdrop{padding:0;align-items:flex-end}
  .modal{border-radius:20px 20px 0 0;max-width:100%!important;margin:0}
  .toast{bottom:84px;right:12px;left:12px;font-size:12px}
  /* hide search on dashboard on mobile, show inline */
  .search-box{max-width:none}
}
</style>
</head>

</div>

<!-- MORE SHEET (mobile) -->
<div class="more-overlay" id="more-overlay" onclick="closeMore()"></div>

  <div class="more-item" id="mn-config" onclick="go('config');closeMore()"><i class="ti ti-settings"></i>Configurações</div>
</div>

<div class="main">
  <div class="topbar">
    <div>
      <div class="topbar-title" id="ptitle">Dashboard</div>
      <div class="topbar-sub" id="psub">Visão geral do negócio</div>
    </div>
    <span id="sync-status" style="font-size:11px;color:var(--text3);white-space:nowrap;margin-left:auto;margin-right:8px"></span>
    <div class="search-box">
      <i class="ti ti-search" style="color:var(--text3)"></i>

  mc.innerHTML = '<div class="modal-backdrop" onclick="if(event.target===this)closeM()">'
    + '<div class="modal" style="max-width:480px">'
    + '<div class="modal-header"><div class="modal-title">Importar aulas antigas</div><button class="btn btn-ghost btn-sm" onclick="closeM()"><i class="ti ti-x"></i></button></div>'
    + '<div class="modal-body">'
    + '<p style="font-size:12px;color:var(--text2);margin-bottom:16px;line-height:1.6">Informe as datas das aulas j\u00e1 realizadas por <strong>' + a.nome.split(' ')[0] + '</strong>. Uma data por linha (formato DD/MM/AAAA ou AAAA-MM-DD).</p>'
    + '<div class="form-group"><label class="form-label">Datas das aulas (uma por linha)</label><textarea class="form-input" id="datas_antigas" rows="8" placeholder="15/05/2025&#10;18/05/2025&#10;22/05/2025&#10;25/05/2025"></textarea></div>'
    + '<div class="form-group"><label class="form-label">Hor\u00e1rio padr\u00e3o</label><input class="form-input" id="hora_antigas" type="time" value="07:00"></div>'
    + '<p style="font-size:11px;color:var(--text3);margin-top:8px">As aulas ser\u00e3o registradas como "Realizada" e descontadas do pacote ativo.</p>'
    + '</div>'
    + '<div class="modal-footer">'
    + '<button class="btn btn-ghost" onclick="closeM()">Cancelar</button>'
    + '<button class="btn btn-primary" onclick="salvarAulasAntigas(' + aid + ')"><i class="ti ti-check"></i>Importar</button>'
    + '</div></div></div>';
}
function salvarAulasAntigas(aid) {
  var raw = document.getElementById('datas_antigas').value;
  var hora = document.getElementById('hora_antigas').value || '07:00';
  var linhas = raw.split('\n').map(function(l){ return l.trim(); }).filter(function(l){ return l.length > 0; });
  if (linhas.length === 0) { toast('Informe pelo menos uma data'); return; }
  var p = pacAti(aid);
  var importadas = 0;
  var ignoradas = 0;
  linhas.forEach(function(linha) {
    // Accept DD/MM/AAAA or AAAA-MM-DD
    var data = '';
    if (/^\d{2}\/\d{2}\/\d{4}$/.test(linha)) {
      var pts = linha.split('/');
      data = pts[2] + '-' + pts[1] + '-' + pts[0];
    } else if (/^\d{4}-\d{2}-\d{2}$/.test(linha)) {
      data = linha;
    } else {
      ignoradas++;
      return;
    }
    nid++;
    D.aulas.push({ id: nid, aid: aid, data: data, hora: hora, status: 'realizada', obs: 'Importada' });
    if (p && rest(p) > 0) {
      p.usadas++;
      if (rest(p) === 0) p.status = 'finalizado';
    }
    importadas++;
  });
  saveLocal();
  closeM();
  render();
  var msg = importadas + ' aula(s) importada(s)';
  if (ignoradas > 0) msg += ', ' + ignoradas + ' data(s) inv\u00e1lida(s) ignorada(s)';
  toast(msg);
}
function desfazerAula(aulaid, aid) {
  var au = D.aulas.find(function(x){ return x.id === aulaid; });
  if (!au) return;
  // Devolve a aula ao pacote
  var p = D.pacotes.find(function(pk){ return pk.aid === aid && (pk.status === 'ativo' || pk.status === 'finalizado'); });
  if (p && au.status === 'realizada') {
    p.usadas = Math.max(0, p.usadas - 1);
    if (p.status === 'finalizado' && rest(p) > 0) p.status = 'ativo';
  }
  au.status = 'cancelada_personal';
  saveLocal();
  render();
  toast('Aula desmarcada - aula devolvida ao pacote');
}
function reabrirAula(aulaid, aid) {
  var au = D.aulas.find(function(x){ return x.id === aulaid; });
  if (!au) return;
  // Desconta a aula do pacote novamente
  var p = D.pacotes.find(function(pk){ return pk.aid === aid && (pk.status === 'ativo' || pk.status === 'finalizado'); });
  if (p && rest(p) > 0) {
    p.usadas++;
    if (rest(p) === 0) p.status = 'finalizado';
  }
  au.status = 'realizada';
  saveLocal();
  render();
  toast('Aula marcada como realizada!');
}
// Load from cloud first, then render
loadLocal(); render(); // render immediately from cache
loadCloud(function() { render(); }); // then refresh from cloud
