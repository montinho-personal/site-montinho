<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" role="img" aria-label="Exercícios Para Fortalecer o Joelho: Protocolo Completo Para Estabilidade e Prevenção">
  <title>Exercícios Para Fortalecer o Joelho: Protocolo Completo Para Estabilidade e Prevenção</title>
  <desc>Infográfico: Exercícios Para Fortalecer o Joelho: Protocolo Completo Para Estabilidade e Prevenção</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#111111"/>
      <stop offset="100%" stop-color="#0a0a0a"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#C9AE60"/>
      <stop offset="100%" stop-color="#A08030"/>
    </linearGradient>
  </defs>
  <!-- background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- border -->
  <rect x="2" y="2" width="1196" height="626" fill="none" stroke="#BA9E50" stroke-width="1.5" opacity="0.4"/>
  <!-- accent line -->
  <rect x="0" y="0" width="6" height="630" fill="url(#gold)"/>
  <!-- branding -->
  <text x="1176" y="614" font-family="Arial,sans-serif" font-size="11" fill="#555555" text-anchor="end">montinhopersonal.com.br</text>
  <rect x="60" y="30" width="68" height="24" rx="12" fill="#BA9E50" opacity="0.2"/>
  <text x="70" y="47" font-family="Arial,sans-serif" font-size="12" fill="#BA9E50" font-weight="bold">JOELHO</text>
  <text x="60" y="90" font-family="Arial,sans-serif" font-size="36" fill="#F5F5F5" font-weight="bold">Fortalecimento do Joelho</text>
  <text x="60" y="146" font-family="Arial,sans-serif" font-size="16" fill="#555555">Protocolo progressivo de reabilitação</text>
  <rect x="60" y="168" width="80" height="3" rx="2" fill="url(#gold)"/>
  <rect x="60" y="200" width="340" height="120" rx="8" fill="#1a1a1a" stroke="#BA9E50" stroke-width="0.8" opacity="0.9"/>
  <circle cx="88" cy="228" r="16" fill="url(#gold)"/>
  <text x="88" y="234" font-family="Arial,sans-serif" font-size="16" fill="#0d0d0d" text-anchor="middle" font-weight="bold">1</text>
  <text x="116" y="224" font-family="Arial,sans-serif" font-size="15" fill="#F5F5F5" font-weight="bold">Fase 1 — Básico</text>
  <text x="76" y="268" font-family="Arial,sans-serif" font-size="12" fill="#555555">Contração isométrica de quad, elevação</text>
  <text x="76" y="285" font-family="Arial,sans-serif" font-size="12" fill="#555555">da perna, mini-agachamento</text>
  <rect x="420" y="200" width="340" height="120" rx="8" fill="#1a1a1a" stroke="#BA9E50" stroke-width="0.8" opacity="0.9"/>
  <circle cx="448" cy="228" r="16" fill="url(#gold)"/>
  <text x="448" y="234" font-family="Arial,sans-serif" font-size="16" fill="#0d0d0d" text-anchor="middle" font-weight="bold">2</text>
  <text x="476" y="224" font-family="Arial,sans-serif" font-size="15" fill="#F5F5F5" font-weight="bold">Fase 2 — Intermediário</text>
  <text x="436" y="268" font-family="Arial,sans-serif" font-size="12" fill="#555555">Leg press unilateral, cadeira</text>
  <text x="436" y="285" font-family="Arial,sans-serif" font-size="12" fill="#555555">extensora leve, step-up</text>
  <rect x="780" y="200" width="340" height="120" rx="8" fill="#1a1a1a" stroke="#BA9E50" stroke-width="0.8" opacity="0.9"/>
  <circle cx="808" cy="228" r="16" fill="url(#gold)"/>
  <text x="808" y="234" font-family="Arial,sans-serif" font-size="16" fill="#0d0d0d" text-anchor="middle" font-weight="bold">3</text>
  <text x="836" y="224" font-family="Arial,sans-serif" font-size="15" fill="#F5F5F5" font-weight="bold">Fase 3 — Avançado</text>
  <text x="796" y="268" font-family="Arial,sans-serif" font-size="12" fill="#555555">Agachamento búlgaro, RDL, agachamento</text>
  <text x="796" y="285" font-family="Arial,sans-serif" font-size="12" fill="#555555">livre com carga</text>
  <rect x="60" y="340" width="340" height="120" rx="8" fill="#1a1a1a" stroke="#BA9E50" stroke-width="0.8" opacity="0.9"/>
  <circle cx="88" cy="368" r="16" fill="url(#gold)"/>
  <text x="88" y="374" font-family="Arial,sans-serif" font-size="16" fill="#0d0d0d" text-anchor="middle" font-weight="bold">4</text>
  <text x="116" y="364" font-family="Arial,sans-serif" font-size="15" fill="#F5F5F5" font-weight="bold">Propriocepção</text>
  <text x="76" y="408" font-family="Arial,sans-serif" font-size="12" fill="#555555">Equilíbrio unipodal, disco de</text>
  <text x="76" y="425" font-family="Arial,sans-serif" font-size="12" fill="#555555">equilíbrio, step lateral</text>
  <rect x="420" y="340" width="340" height="120" rx="8" fill="#1a1a1a" stroke="#BA9E50" stroke-width="0.8" opacity="0.9"/>
  <circle cx="448" cy="368" r="16" fill="url(#gold)"/>
  <text x="448" y="374" font-family="Arial,sans-serif" font-size="16" fill="#0d0d0d" text-anchor="middle" font-weight="bold">5</text>
  <text x="476" y="364" font-family="Arial,sans-serif" font-size="15" fill="#F5F5F5" font-weight="bold">Flexibilidade</text>
  <text x="436" y="408" font-family="Arial,sans-serif" font-size="12" fill="#555555">Alongamento de isquio, IT band,</text>
  <text x="436" y="425" font-family="Arial,sans-serif" font-size="12" fill="#555555">panturrilha e quadril</text>
  <rect x="780" y="340" width="340" height="120" rx="8" fill="#1a1a1a" stroke="#BA9E50" stroke-width="0.8" opacity="0.9"/>
  <circle cx="808" cy="368" r="16" fill="url(#gold)"/>
  <text x="808" y="374" font-family="Arial,sans-serif" font-size="16" fill="#0d0d0d" text-anchor="middle" font-weight="bold">6</text>
  <text x="836" y="364" font-family="Arial,sans-serif" font-size="15" fill="#F5F5F5" font-weight="bold">Progressão</text>
  <text x="796" y="408" font-family="Arial,sans-serif" font-size="12" fill="#555555">Aumente carga apenas quando executar</text>
  <text x="796" y="425" font-family="Arial,sans-serif" font-size="12" fill="#555555">3x12 sem dor ou compensação</text>
</svg>