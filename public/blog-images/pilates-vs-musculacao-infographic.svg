<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" role="img" aria-label="Pilates ou Musculação: Qual é Melhor para Você?">
  <title>Pilates ou Musculação: Qual é Melhor para Você?</title>
