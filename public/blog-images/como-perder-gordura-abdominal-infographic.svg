  <text x="60" y="78" font-family="Arial,sans-serif" font-size="36" fill="#F5F5F5" font-weight="bold">Como Perder Gordura Abdominal de Verdade (Sem</text>
  <text x="60" y="120" font-family="Arial,sans-serif" font-size="36" fill="#F5F5F5" font-weight="bold">Mitos)</text>
  <text x="60" y="176" font-family="Arial,sans-serif" font-size="16" fill="#555555">Estratégia científica de perda de gordura</text>
  <rect x="60" y="198" width="80" height="3" rx="2" fill="url(#gold)"/>
  <rect x="60" y="200" width="520" height="50" rx="25" fill="#1a1a1a" stroke="#BA9E50" stroke-width="0.6"/>
  <text x="84" y="232" font-family="Arial,sans-serif" font-size="20">🔥</text>
  <text x="116" y="222" font-family="Arial,sans-serif" font-size="13" fill="#F5F5F5">Déficit calórico de 300–500 kcal/dia</text>
  <text x="116" y="238" font-family="Arial,sans-serif" font-size="13" fill="#F5F5F5">para perda sustentável</text>
