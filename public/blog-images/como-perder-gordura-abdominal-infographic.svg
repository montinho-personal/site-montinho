  <text x="624" y="232" font-family="Arial,sans-serif" font-size="20">💪</text>
  <text x="656" y="222" font-family="Arial,sans-serif" font-size="13" fill="#F5F5F5">Manter proteína alta: 1.6–2.2g por kg de</text>
  <text x="656" y="238" font-family="Arial,sans-serif" font-size="13" fill="#F5F5F5">peso corporal</text>
