  <text x="84" y="360" font-family="Arial,sans-serif" font-size="20">💧</text>
  <text x="116" y="350" font-family="Arial,sans-serif" font-size="13" fill="#F5F5F5">Hidratação: 35 ml por kg de peso</text>
  <text x="116" y="366" font-family="Arial,sans-serif" font-size="13" fill="#F5F5F5">corporal por dia</text>
  <rect x="600" y="328" width="520" height="50" rx="25" fill="#1a1a1a" stroke="#BA9E50" stroke-width="0.6"/>
  <text x="624" y="360" font-family="Arial,sans-serif" font-size="20">📊</text>
  <text x="656" y="350" font-family="Arial,sans-serif" font-size="13" fill="#F5F5F5">Monitorar progresso: peso, fotos e</text>
  <text x="656" y="366" font-family="Arial,sans-serif" font-size="13" fill="#F5F5F5">medidas a cada 2 semanas</text>
  <rect x="60" y="392" width="520" height="50" rx="25" fill="#1a1a1a" stroke="#BA9E50" stroke-width="0.6"/>
  <text x="84" y="424" font-family="Arial,sans-serif" font-size="20">🍽️</text>
  <text x="116" y="414" font-family="Arial,sans-serif" font-size="13" fill="#F5F5F5">Priorizar alimentos minimamente</text>
  <text x="116" y="430" font-family="Arial,sans-serif" font-size="13" fill="#F5F5F5">processados e alta saciedade</text>
  <rect x="600" y="392" width="520" height="50" rx="25" fill="#1a1a1a" stroke="#BA9E50" stroke-width="0.6"/>
  <text x="624" y="424" font-family="Arial,sans-serif" font-size="20">⏱️</text>
  <text x="656" y="414" font-family="Arial,sans-serif" font-size="13" fill="#F5F5F5">Paciência: perda saudável é de 0.5–1 kg</text>
  <text x="656" y="430" font-family="Arial,sans-serif" font-size="13" fill="#F5F5F5">por semana</text>
